upstream strapi_upstream {
    server 127.0.0.1:1337;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate /Users/password9090/Desktop/SampleroVSTPluginero/certs/server/nginx.crt;
    ssl_certificate_key /Users/password9090/Desktop/SampleroVSTPluginero/certs/server/nginx.key;
    ssl_client_certificate /Users/password9090/Desktop/SampleroVSTPluginero/.docker-pki/current/trust/ca-chain.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header x-ssl-verified "";
    proxy_set_header x-client-cert-serial "";
    proxy_set_header x-client-cert-fingerprint "";
    proxy_set_header x-client-cert "";
    proxy_set_header x-client-cert-subject "";
    proxy_set_header x-client-cert-issuer "";
    proxy_set_header x-license-proxy-token change-me-proxy-shared-secret;

    location = /api/license/activate {
        proxy_pass http://strapi_upstream/api/license-server/license/activate;
    }

    location = /api/license/deactivate {
        proxy_pass http://strapi_upstream/api/license-server/license/deactivate;
    }

    location = /api/license/status {
        proxy_pass http://strapi_upstream/api/license-server/license/status;
    }

    location = /api/license/validate {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_set_header x-ssl-verified $ssl_client_verify;
        proxy_set_header x-client-cert-serial $ssl_client_serial;
        proxy_set_header x-client-cert-fingerprint $ssl_client_fingerprint;
        proxy_set_header x-client-cert $ssl_client_escaped_cert;
        proxy_set_header x-client-cert-subject $ssl_client_s_dn;
        proxy_set_header x-client-cert-issuer $ssl_client_i_dn;

        proxy_pass http://strapi_upstream/api/license-server/license/validate;
    }

    location = /api/license/heartbeat {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }

        proxy_set_header x-ssl-verified $ssl_client_verify;
        proxy_set_header x-client-cert-serial $ssl_client_serial;
        proxy_set_header x-client-cert-fingerprint $ssl_client_fingerprint;
        proxy_set_header x-client-cert $ssl_client_escaped_cert;
        proxy_set_header x-client-cert-subject $ssl_client_s_dn;
        proxy_set_header x-client-cert-issuer $ssl_client_i_dn;

        proxy_pass http://strapi_upstream/api/license-server/license/heartbeat;
    }

    location / {
        proxy_pass http://strapi_upstream;
    }
}